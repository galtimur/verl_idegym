hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

algorithm:
  adv_estimator: grpo
data:
  max_prompt_length: 16000
  max_response_length: 4096
  train_batch_size: 4
  return_raw_chat: True
  train_files: JetBrains-Research/django_method_gen:train
  val_files: JetBrains-Research/django_method_gen:test
  custom_cls:
    path: examples/django_idegym/hf_dataset.py
    name: HFHubDataset

actor_rollout_ref:
  hybrid_engine: True
  actor:
    use_dynamic_bsz: True
    ppo_mini_batch_size: 8
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    ppo_epochs: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 2
  rollout:
    name: vllm
    response_length: 4096
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.6
    log_prob_micro_batch_size_per_gpu: 2
    multi_turn:
      enable: True
      max_assistant_turns: 10
      max_parallel_calls: 1
      format: hermes
      tool_config_path: null
    agent:
      default_agent_loop: idegym_django
      agent_loop_config_path: examples/django_idegym/config/agent_loop_config.yaml
